<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDB927"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDB927" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon points="40,6 68,22 68,54 40,70 12,54 12,22" fill="url(#g2)" stroke="url(#g1)" stroke-width="1.2"/>

  <!-- H letter -->
  <text x="40" y="47" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="30" fill="url(#g1)">H</text>

  <!-- Divider line -->
  <line x1="82" y1="16" x2="82" y2="60" stroke="rgba(253,185,39,0.25)" stroke-width="1"/>

  <!-- HIDRAULIKA text -->
  <text x="94" y="34" font-family="Arial, sans-serif" font-weight="700" font-size="13.5" fill="white" letter-spacing="2">HIDRAULIKA</text>

  <!-- SERVICE TEAM text -->
  <text x="94" y="52" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="rgba(253,185,39,0.75)" letter-spacing="3.5">SERVICE TEAM</text>

  <!-- Bottom line accent -->
  <line x1="94" y1="60" x2="210" y2="60" stroke="url(#g1)" stroke-width="1" stroke-opacity="0.35"/>
</svg>
